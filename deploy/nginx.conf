# ============================================================================
# Oncology Aid — 生产环境 nginx 配置模板
# ============================================================================
# 部署前请根据实际环境修改：
#   1. server_name         — 替换为医院内网域名或 IP
#   2. ssl_certificate     — 替换为实际的 SSL 证书路径
#   3. ssl_certificate_key — 替换为实际的私钥路径
#   4. upstream 地址       — 替换为实际的后端服务器地址
# ============================================================================
#
# 架构概览：
#   浏览器 (HTTPS :443)
#     └─ nginx
#         ├─ /                    → SPA 静态文件 (dist/)
#         ├─ /api/health          → Case Storage (:8052)
#         ├─ /api/user/*          → Case Storage (:8052)
#         ├─ /api/cases/*         → Case Storage (:8052)
#         ├─ /api/ebm/*           → PathoEBM (:8051)  [路由改写: /api/ebm → /]
#         ├─ /api/v1/*            → PathoRAG (:8050)   [含 SSE 流式]
#         └─ /health              → PathoEBM 健康检查
# ============================================================================

upstream case_storage {
    # Case Storage API — 与 nginx 部署在同一台服务器
    server 127.0.0.1:8052;
    keepalive 16;
}

upstream patho_rag {
    # PathoRAG — 病理分析 + 患者画像 + MDT 方案 SSE 流式
    # 替换为实际的 GPU 推理服务器地址
    server 117.50.173.249:8050;
    keepalive 16;
}

upstream patho_ebm {
    # PathoEBM — 循证深搜异步任务
    # 替换为实际的 GPU 推理服务器地址
    server 117.50.173.249:8051;
    keepalive 16;
}

# ── HTTP → HTTPS 重定向 ─────────────────────────────────────

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS 主服务 ────────────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name _;  # 替换为实际域名

    # ═══════════════════════════════════════════════════════════
    # SSL 证书 — 替换为医院内网 CA 签发的证书路径
    # ═══════════════════════════════════════════════════════════
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # 现代 TLS 配置 (Mozilla Intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ═══════════════════════════════════════════════════════════
    # 安全头
    # ═══════════════════════════════════════════════════════════
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ═══════════════════════════════════════════════════════════
    # 通用
    # ═══════════════════════════════════════════════════════════
    client_max_body_size 10m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_proxied any;

    # ═══════════════════════════════════════════════════════════
    # Case Storage API (病例持久化)
    # ═══════════════════════════════════════════════════════════

    # 健康检查
    location /api/health {
        proxy_pass http://case_storage;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 用户信息
    location /api/user/ {
        proxy_pass http://case_storage;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 病例 CRUD（含 /api/cases/active）
    location /api/cases {
        proxy_pass http://case_storage;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ═══════════════════════════════════════════════════════════
    # PathoEBM — 循证深搜（路径改写：/api/ebm → /）
    # ═══════════════════════════════════════════════════════════

    # EBM 健康检查
    location = /api/ebm/health {
        proxy_pass http://patho_ebm/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # EBM 通用路由（/api/ebm/jobs → /jobs）
    location /api/ebm/ {
        rewrite ^/api/ebm/(.*) /$1 break;
        proxy_pass http://patho_ebm;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # EBM 是轮询式异步 API，超时可较短
        proxy_read_timeout 30s;
    }

    # ═══════════════════════════════════════════════════════════
    # PathoRAG — FIGO / Profile / MDT SSE 流式
    # ═══════════════════════════════════════════════════════════

    # SSE 流式端点（长连接，禁用缓冲）
    location /api/v1/analyze/stream {
        proxy_pass http://patho_rag;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 关键配置
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;   # MDT 生成最多 10 分钟
        chunked_transfer_encoding on;
    }

    # PathoRAG 通用路由
    location /api/v1/ {
        proxy_pass http://patho_rag;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ═══════════════════════════════════════════════════════════
    # 前端 SPA 静态文件
    # ═══════════════════════════════════════════════════════════

    root /opt/oncology-aid/dist;
    index index.html;

    # 静态资源（长缓存，带 hash 的构建产物）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — 所有非 API 路径返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ═══════════════════════════════════════════════════════════
    # 日志
    # ═══════════════════════════════════════════════════════════
    access_log /var/log/nginx/oncology-aid-access.log;
    error_log  /var/log/nginx/oncology-aid-error.log warn;
}
