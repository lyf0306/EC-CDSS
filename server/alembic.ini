# Alembic 配置文件 — 数据库迁移管理
#
# 用法:
#   cd server
#   alembic revision --autogenerate -m "描述你的改动"   # 生成迁移脚本
#   alembic upgrade head                                   # 应用所有未执行的迁移
#   alembic downgrade -1                                   # 回滚最近一次迁移
#   alembic current                                        # 查看当前版本
#
# sqlalchemy.url 由 env.py 从 config.py 动态注入，此处留空即可。

[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
